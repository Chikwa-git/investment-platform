<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stock</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<script>
  const params = new URLSearchParams(window.location.search);
  const ticker = (params.get("ticker") || "—").toUpperCase();

  document.getElementById("stock-title").textContent =
    `Ação: ${ticker}`;

  // busca novamente
  const input = document.getElementById("search-input");
  const btn = document.getElementById("search-btn");

  function goSearch() {
    const value = input.value.trim().toUpperCase();
    if (!value) return;
    window.location.href = `./stock.html?ticker=${value}`;
  }

  btn.addEventListener("click", goSearch);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") goSearch();
  });
</script>

<body class="bg-light">

  <div class="container py-5" style="max-width: 980px;">

    <!-- Search -->
    <div class="mb-4">
      <div class="input-group">
        <input id="search-input" class="form-control"
          placeholder="Pesquisar outra ação (ex: VALE3)" />
        <button id="search-btn" class="btn btn-primary">Buscar</button>
      </div>
    </div>

    <!-- Header -->
    <h2 id="stock-title" class="mb-4"></h2>

    <!-- Chart -->
    <div class="card p-4 mb-4">
      <h5>Gráfico</h5>
      <div class="text-secondary">
        Área do gráfico diário (em breve).
      </div>
    </div>

    <!-- Indicators -->
    <div class="card p-4 mb-4">
      <h5>Indicadores</h5>
      <div class="text-secondary">
        P/L, Dividend Yield, Market Cap e outros indicadores.
      </div>
    </div>

    <!-- Facts -->
    <div class="card p-4 mb-4">
      <h5>Fatos relevantes (últimos 3 meses)</h5>
      <div class="text-secondary">
        Eventos importantes e notícias relevantes.
      </div>
    </div>

    <!-- AI Explanation -->
    <div class="card p-4">
      <h5>Resumo educativo (IA)</h5>
      <div class="text-secondary">
        Explicação contextual gerada por IA.
      </div>
    </div>
  </div>

</body>
</html>
